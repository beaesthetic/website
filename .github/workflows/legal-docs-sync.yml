name: legal-docs-sync

on:
  repository_dispatch:
    types:
      - legal-docs-updated
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-legal-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync legal documents from compliance repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LEGAL_DOCS_GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const documents = [
              {
                owner: 'beaesthetic',
                repo: 'beaesthetic-gdpr-compliance',
                ref: 'main',
                sourcePath: '10-sito-pubblico/11-informativa-privacy-sito-pubblico.md',
                outputPath: 'public/legal/privacy-policy.md',
              },
              {
                owner: 'beaesthetic',
                repo: 'beaesthetic-gdpr-compliance',
                ref: 'main',
                sourcePath: '03-informativa-pubblicata/03-informativa-privacy-clienti.md',
                outputPath: 'public/legal/admin-app-privacy-policy.md',
              },
            ];

            for (const document of documents) {
              const response = await github.rest.repos.getContent({
                owner: document.owner,
                repo: document.repo,
                path: document.sourcePath,
                ref: document.ref,
                mediaType: {
                  format: 'raw',
                },
              });

              const outputPath = path.join(process.env.GITHUB_WORKSPACE, document.outputPath);
              fs.mkdirSync(path.dirname(outputPath), { recursive: true });
              fs.writeFileSync(outputPath, response.data, 'utf8');
              core.info(`Synced ${document.sourcePath} -> ${document.outputPath}`);
            }

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync legal documents'
          branch: 'chore/sync-legal-documents'
          delete-branch: true
          title: 'chore: sync legal documents'
          body: |
            Syncs privacy policy documents from `beaesthetic/beaesthetic-gdpr-compliance`.

            Trigger:
            - `${{ github.event_name }}`
